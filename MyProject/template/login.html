{% extends "base.html" %}
{% block content %}

<main class="app-page auth-page">
    <section class="main_register">
        <span>Please Login.</span>
        <div id="log-in">
            <form id="signin" action="#" method="post">
                {% csrf_token %}
                {% if error %}
                    <h4 class="error-message">{{ error }}</h4>
                {% endif %}

                <label for="login-email">Email</label>
                <input id="login-email" class="input" type="email" name="email" placeholder="Enter your email" required>

                <label for="login-password">Password</label>
                <input id="login-password" class="input" type="password" name="password" required>

                <input class="button" type="submit" value="Log in">
                <a class="secondary-action" href="{% url 'signup' %}">Sign Up</a>

                {% if messages %}
                    <div class="message-list">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            </form>
        </div>
    </section>
</main>

{% endblock %}
