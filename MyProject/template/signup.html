{% extends "base.html" %}
{% block content %}

<main class="app-page auth-page">
    <section class="main_register">
        <span>Create your account.</span>
        <div id="register">
            <form id="signup" action="" method="POST">
                {% csrf_token %}
                <div id="dividecol">
                    <div id="col1">
                        <label for="signup-name">Full Name</label>
                        <input id="signup-name" class="input" type="text" name="name" placeholder="Enter your name" required>

                        <label for="signup-email">Email</label>
                        <input id="signup-email" class="input" type="email" name="email" placeholder="Enter your email" required>

                        <div class="radio-group">
                            <p>Gender:</p>
                            <label><input type="radio" name="gender" value="m"> Male</label>
                            <label><input type="radio" name="gender" value="f"> Female</label>
                            <label><input type="radio" name="gender" value="o"> Others</label>
                        </div>

                        <label for="signup-address">Address</label>
                        <input id="signup-address" class="input" type="text" name="address">
                    </div>

                    <div id="col2">
                        <label for="signup-phone">Phone</label>
                        <input id="signup-phone" class="input" type="number" name="phone" placeholder="Enter your number">

                        <label for="signup-password">Password</label>
                        <input id="signup-password" class="input" type="password" name="password1" required>

                        <label for="signup-confirm-password">Confirm Password</label>
                        <input id="signup-confirm-password" class="input" type="password" name="password2" required>

                        <input class="button" type="submit" value="Sign Up">
                        <p class="signup-link">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
                    </div>
                </div>

                {% if messages %}
                    <div class="message-list">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            </form>
        </div>
    </section>
</main>

{% endblock %}
