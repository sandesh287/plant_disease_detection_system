{% extends "base.html" %}
{% block content %}

<main id="updateProfile" class="app-page profile-page">
    <section class="profile-container">
        <h1>Update Profile</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Update Profile</button>
        </form>
    </section>
</main>

{% endblock %}
